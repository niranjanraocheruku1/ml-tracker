
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1117;--bg2:#161b27;--bg3:#1e2433;--bg4:#252d3d;
--border:#2a3245;--border2:#3a4560;
--text:#e8ecf4;--text2:#8b95b0;--text3:#5a6480;
--purple:#7c6df9;--purple2:#6355e0;--purple-dim:#7c6df918;
--teal:#2dd4bf;--teal-dim:#2dd4bf15;
--amber:#f59e0b;--amber-dim:#f59e0b15;
--coral:#f97316;--coral-dim:#f9731615;
--green:#22c55e;--green-dim:#22c55e15;
--red:#ef4444;--red-dim:#ef444415;
--blue:#3b82f6;--blue-dim:#3b82f615;
--font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh;display:flex}
.sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow:hidden}
.sidebar-logo{padding:20px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--purple),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:600;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sidebar-section{padding:12px 12px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;margin:1px 8px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:500}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--purple-dim);color:var(--purple)}
.nav-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--purple);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.streak-card{margin:12px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.streak-num{font-size:28px;font-weight:700;color:var(--amber);line-height:1}
.streak-label{font-size:11px;color:var(--text3);margin-top:2px}
.streak-fire{font-size:20px}

.main{flex:1;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--text)}
.topbar-date{font-size:12px;color:var(--text3);margin-left:auto}
.topbar-score{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--purple-dim);border:1px solid var(--purple)33;border-radius:8px;font-size:13px;font-weight:600;color:var(--purple)}
.content{flex:1;overflow-y:auto;padding:24px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}

/* Stat cards */
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-change{font-size:11px;font-weight:600;margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}

/* Task list */
.task-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.task-item:last-child{border-bottom:none}
.task-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.task-cb.done{background:var(--purple);border-color:var(--purple)}
.task-cb.done::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.task-text{flex:1;font-size:13px;transition:color .15s}
.task-text.done{color:var(--text3);text-decoration:line-through}
.task-pts{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.cat-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.cat-projects{background:var(--purple-dim);color:var(--purple)}
.cat-dsa{background:var(--teal-dim);color:var(--teal)}
.cat-theory{background:var(--amber-dim);color:var(--amber)}
.cat-content{background:var(--coral-dim);color:var(--coral)}

/* Progress bars */
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* AI Panel */
.ai-suggestion{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ai-label{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ai-text{font-size:13px;color:var(--text2);line-height:1.5}
.ai-response{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;max-height:300px;overflow-y:auto;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;padding:12px}
.dot-anim{display:flex;gap:4px}
.dot-anim span{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:dotpulse 1.2s ease-in-out infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn:hover{background:var(--bg4);border-color:var(--border2)}
.btn-primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple2);border-color:var(--purple2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:6px 8px}

/* Input */
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;width:100%;font-family:var(--font);transition:border .15s}
.inp:focus{outline:none;border-color:var(--purple)}
.inp-row{display:flex;gap:8px;margin-bottom:14px}

/* Chart bars */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:2px}
.bar-label{font-size:10px;color:var(--text3);text-align:center}
.bar-val{font-size:10px;color:var(--text2);font-weight:600}

/* Heatmap */
.heatmap{display:flex;flex-direction:column;gap:3px}
.heatmap-row{display:flex;gap:3px}
.heatmap-cell{width:14px;height:14px;border-radius:3px;background:var(--bg4);cursor:default}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px #0003}

/* Time blocks */
.timeblock{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.timeblock:last-child{border-bottom:none}
.tb-time{font-size:11px;color:var(--text3);min-width:80px;padding-top:2px;font-feature-settings:'tnum'}
.tb-bar{width:4px;border-radius:2px;min-height:36px;flex-shrink:0;margin-top:2px}
.tb-content{flex:1}
.tb-title{font-size:13px;font-weight:500;color:var(--text)}
.tb-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* Score ring */
.score-ring{display:flex;align-items:center;justify-content:center;position:relative}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Textarea */
textarea.inp{resize:vertical;min-height:80px}

/* Notification dot */
.notif-dot{width:6px;height:6px;background:var(--coral);border-radius:50%;margin-left:auto}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:600;color:var(--text)}

/* Category score bars */
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-name{font-size:12px;color:var(--text2);min-width:72px}
.cat-bar-wrap{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px}
.cat-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right;color:var(--text2)}

/* Chip */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}

/* Toggle */
.toggle{width:38px;height:22px;border-radius:11px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:400px;max-width:90vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* Weekday labels */
.weekday-labels{display:flex;gap:8px;margin-bottom:6px;padding-left:4px}
.weekday-label{font-size:10px;color:var(--text3);min-width:14px;text-align:center}

/* AI chat input */
.chat-row{display:flex;gap:8px;margin-top:12px}

/* Points badge */
.pts-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--purple-dim);color:var(--purple)}

/* Phase badge */
.phase{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.06em;margin-left:8px}
.phase-1{background:var(--teal-dim);color:var(--teal)}
.phase-3{background:var(--purple-dim);color:var(--purple)}

/* Recommendation card types */
.rec-card{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.rec-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.rec-body{}
.rec-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-sub{font-size:12px;color:var(--text3)}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">MLTracker</div>
      <div class="logo-sub">Daily Execution OS</div>
    </div>
  </div>

  <div style="padding:8px 0">
    <div class="sidebar-section">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">◉</span> Dashboard</div>
    <div class="nav-item" onclick="showPage('tracker')"><span class="nav-icon">✓</span> Daily Tracker</div>
    <div class="nav-item" onclick="showPage('timeblocks')"><span class="nav-icon">◷</span> Time Blocks</div>
    <div class="nav-item" onclick="showPage('analytics')"><span class="nav-icon">▤</span> Analytics</div>
    <div class="nav-item" onclick="showPage('ai')"><span class="nav-icon">✦</span> AI Coach <span class="nav-badge">AI</span></div>
    <div class="sidebar-section">System</div>
    <div class="nav-item" onclick="showPage('weekly')"><span class="nav-icon">☷</span> Weekly Review</div>
    <div class="nav-item" onclick="showPage('settings')"><span class="nav-icon">⚙</span> Settings</div>
  </div>

  <div style="margin-top:auto;padding:12px">
    <div class="streak-card">
      <div class="streak-fire">🔥</div>
      <div class="streak-num" id="sidebar-streak">0</div>
      <div class="streak-label">Day Streak</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div style="flex:1"></div>
    <div class="topbar-score" id="topbar-score">⚡ 0 / 100 pts</div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>
  <div class="content" id="content-area"></div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="task-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Add Task</div>
    <div class="mb16">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Task name</div>
      <input class="inp" id="new-task-name" placeholder="e.g. Solve 2 LeetCode problems" />
    </div>
    <div class="mb16">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Category</div>
      <select class="inp" id="new-task-cat">
        <option value="dsa">DSA Practice</option>
        <option value="projects">Projects</option>
        <option value="theory">ML Theory</option>
        <option value="content">LinkedIn / Content</option>
      </select>
    </div>
    <div class="mb16">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Points (1–30)</div>
      <input class="inp" id="new-task-pts" type="number" min="1" max="30" value="10" />
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'mltracker_v2';
let state = loadState();

function defaultState() {
  const today = todayKey();
  return {
    tasks: [
      {id:1,name:'Solve 2 LeetCode (Medium)',cat:'dsa',pts:15,done:false},
      {id:2,name:'Read Attention Is All You Need',cat:'theory',pts:10,done:false},
      {id:3,name:'Work on ML project repo',cat:'projects',pts:20,done:false},
      {id:4,name:'Post progress update on LinkedIn',cat:'content',pts:10,done:false},
      {id:5,name:'Watch Andrej Karpathy lecture',cat:'theory',pts:8,done:false},
      {id:6,name:'Review time complexity notes',cat:'dsa',pts:7,done:true},
    ],
    timeblocks: [
      {id:1,start:'06:00',end:'07:00',title:'Morning review + planning',cat:'theory'},
      {id:2,start:'09:00',end:'11:00',title:'Deep work — ML project',cat:'projects'},
      {id:3,start:'14:00',end:'15:30',title:'DSA practice session',cat:'dsa'},
      {id:4,start:'19:00',end:'20:00',title:'Content creation',cat:'content'},
    ],
    dailyLogs: {},
    streak: 3,
    longestStreak: 7,
    aiKey: '',
    reminderEnabled: true,
    userName: 'ML Engineer',
    weeklyReflection: '',
    nextId: 7,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultState();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

// ============================================================
// COMPUTED
// ============================================================
function totalPts() { return state.tasks.reduce((a,t)=>a+(t.done?t.pts:0),0); }
function maxPts() { return state.tasks.reduce((a,t)=>a+t.pts,0); }
function pctDone() { const m=maxPts(); return m?Math.round(totalPts()/m*100):0; }
function catTasks(cat) { return state.tasks.filter(t=>t.cat===cat); }
function catDone(cat) { return catTasks(cat).filter(t=>t.done); }
function catPct(cat) {
  const total=catTasks(cat).reduce((a,t)=>a+t.pts,0);
  const done=catDone(cat).reduce((a,t)=>a+t.pts,0);
  return total?Math.round(done/total*100):0;
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPage = 'dashboard';
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  const titles = {dashboard:'Dashboard',tracker:'Daily Tracker',timeblocks:'Time Blocks',analytics:'Analytics',ai:'AI Coach',weekly:'Weekly Review',settings:'Settings'};
  document.getElementById('page-title').textContent = titles[page]||page;
  renderPage();
}

function renderPage() {
  updateSidebar();
  const area = document.getElementById('content-area');
  if(currentPage==='dashboard') area.innerHTML = renderDashboard();
  else if(currentPage==='tracker') area.innerHTML = renderTracker();
  else if(currentPage==='timeblocks') area.innerHTML = renderTimeblocks();
  else if(currentPage==='analytics') area.innerHTML = renderAnalytics();
  else if(currentPage==='ai') { area.innerHTML = renderAI(); }
  else if(currentPage==='weekly') area.innerHTML = renderWeekly();
  else if(currentPage==='settings') area.innerHTML = renderSettings();
  if(currentPage==='analytics') renderCharts();
}

function updateSidebar() {
  document.getElementById('sidebar-streak').textContent = state.streak;
  document.getElementById('topbar-score').textContent = `⚡ ${totalPts()} / ${maxPts()} pts`;
  const now = new Date();
  document.getElementById('topbar-date').textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const pct = pctDone();
  const cats = ['projects','dsa','theory','content'];
  const catLabels = {projects:'Projects',dsa:'DSA',theory:'Theory',content:'Content'};
  const catColors = {projects:'var(--purple)',dsa:'var(--teal)',theory:'var(--amber)',content:'var(--coral)'};
  const doneTasks = state.tasks.filter(t=>t.done).length;
  const totalTasks = state.tasks.length;

  // Rule-based recommendations
  const recs = generateRuleRecommendations();

  return `
<div class="grid4 mb20">
  <div class="stat-card">
    <div class="stat-label">Today's Score</div>
    <div class="stat-value" style="color:var(--purple)">${totalPts()}</div>
    <div class="stat-sub">of ${maxPts()} points</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Tasks Done</div>
    <div class="stat-value">${doneTasks}<span style="font-size:16px;color:var(--text3)">/${totalTasks}</span></div>
    <div class="stat-sub">${pct}% complete</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Streak</div>
    <div class="stat-value" style="color:var(--amber)">🔥 ${state.streak}</div>
    <div class="stat-sub">Best: ${state.longestStreak} days</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completion</div>
    <div class="stat-value" style="color:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${pct}%</div>
    <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}"></div></div>
  </div>
</div>

<div class="grid2 mb20">
  <div class="card">
    <div class="card-title">📋 Today's Tasks (Quick View)</div>
    ${state.tasks.slice(0,4).map(t=>`
    <div class="task-item" onclick="toggleTask(${t.id})">
      <div class="task-cb ${t.done?'done':''}"></div>
      <div class="task-text ${t.done?'done':''}">${t.name}</div>
      <span class="cat-tag cat-${t.cat}">${t.cat}</span>
      <span class="pts-badge">${t.pts}pt</span>
    </div>`).join('')}
    <div style="margin-top:12px"><button class="btn btn-sm" onclick="showPage('tracker')">View All →</button></div>
  </div>

  <div class="card">
    <div class="card-title">✦ AI Recommendations <span class="phase phase-1">Rule-based</span></div>
    ${recs.map(r=>`
    <div class="rec-card">
      <div class="rec-icon">${r.icon}</div>
      <div class="rec-body">

  });

  if(state.streak < 3) {
    recs.push({icon:'⚡',title:'Build momentum',text:'Short streak detected. Start with a quick 5-point task to build momentum.'});
  } else {
    recs.push({icon:'🔥',title:`${state.streak}-day streak!`,text:'Keep it going. Don\'t break the chain — complete at least one task today.'});
  }

  // Completion advice
  const pct = pctDone();

  } else if(pct >= 80) {
    recs.push({icon:'🏆',title:'Almost perfect day!',text:'80%+ complete. Finish strong — knock out remaining tasks.'});
  }

  return recs.slice(0,3);
}

function renderHeatmap() {
  const days = 28;
  const cells = [];
  const cats = ['projects','dsa','theory','content'];
  const today = new Date();
  for(let i=days-1;i>=0;i--) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const log = state.dailyLogs[key];
    const intensity = log ? log.pct : (Math.random()>0.3?Math.round(Math.random()*100):0);
    let color = 'var(--bg4)';
    if(intensity>0) color = intensity>=80?'var(--green)':intensity>=50?'var(--amber)':'var(--teal)';
    cells.push(`<div class="heatmap-cell" title="${key}: ${intensity}%" style="background:${color};opacity:${intensity>0?0.3+intensity/100*0.7:0.3}"></div>`);
  }
  const rows = [];
  for(let r=0;r<4;r++) rows.push(`<div class="heatmap-row">${cells.slice(r*7,(r+1)*7).join('')}</div>`);
  return `
  <div style="display:flex;gap:8px;margin-bottom:6px;font-size:10px;color:var(--text3)">
    <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
  </div>
  <div class="heatmap">${rows.join('')}</div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text3)">
    <span>Less</span>
    <div style="display:flex;gap:3px">
      ${['var(--bg4)','var(--teal)','var(--amber)','var(--green)'].map(c=>`<div style="width:12px;height:12px;border-radius:3px;background:${c}"></div>`).join('')}
    </div>
    <span>More</span>
  </div>`;
}

function renderTimeDist() {
  const catColors = {projects:'var(--purple)',dsa:'var(--teal)',theory:'var(--amber)',content:'var(--coral)'};
  const catLabels = {projects:'Projects',dsa:'DSA',theory:'Theory',content:'Content'};
  const cats = ['projects','dsa','theory','content'];
  const minutes = {projects:0,dsa:0,theory:0,content:0};
  state.timeblocks.forEach(tb=>{
    const [sh,sm]=tb.start.split(':').map(Number);
    const [eh,em]=tb.end.split(':').map(Number);
    const dur=(eh*60+em)-(sh*60+sm);
    if(minutes[tb.cat]!==undefined) minutes[tb.cat]+=Math.max(0,dur);
  });
  const total=Object.values(minutes).reduce((a,b)=>a+b,0)||1;
  return cats.map(c=>{
    const pct=Math.round(minutes[c]/total*100);
    const hrs=(minutes[c]/60).toFixed(1);
    return `<div class="cat-row">
      <div class="cat-name">${catLabels[c]}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%;background:${catColors[c]}"></div></div>
      <div class="cat-pct">${hrs}h</div>
    </div>`;
  }).join('');
}

async function callAI(userPrompt) {
  const display = document.getElementById('ai-display');
  if(!display) return;

  display.innerHTML = `<div class="ai-loading"><div class="dot-anim"><span></span><span></span><span></span></div> AI Coach is thinking...</div>`;

  const context = buildAIContext();
  const systemPrompt = `You are an expert ML engineering career coach and productivity system embedded in a daily execution tracker. 
The user is an aspiring ML engineer tracking: DSA practice, ML projects, ML theory, and LinkedIn/content creation.

Current performance data:
${context}

Provide specific, actionable advice in 2-4 short paragraphs. Be direct, motivating, and concrete. 
Use markdown-style formatting with **bold** for key terms and use line breaks between paragraphs.
Focus on what to DO today, not what they should do in general.`;

  const key = state.aiKey;
  if(!key) {
    display.innerHTML = `<div class="ai-suggestion">
      <div class="ai-label">⚠️ No API Key</div>
      <div class="ai-text">Add your Anthropic API key in the AI Coach settings to enable Claude-powered advice. Meanwhile, here's a rule-based tip:<br><br>${generateRuleRecommendations()[0].text}</div>
    </div>`;
    return;
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await response.json();
    if(data.content && data.content[0]) {
      const text = data.content[0].text;
      display.innerHTML = `<div class="ai-response">${text.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--purple)">$1</strong>').replace(/\n/g,'<br>')}</div>`;
    } else {
      display.innerHTML = `<div class="ai-suggestion"><div class="ai-label">⚠️ Error</div><div class="ai-text">${JSON.stringify(data.error||data)}</div></div>`;
    }
  } catch(e) {
    display.innerHTML = `<div class="ai-suggestion"><div class="ai-label">⚠️ Network Error</div><div class="ai-text">${e.message}</div></div>`;
  }
}

  const avg = Math.round(weeklyScores.reduce((a,b)=>a+b,0)/weeklyScores.length);
  const cats = ['projects','dsa','theory','content'];
  const catLabels = {projects:'Projects',dsa:'DSA',theory:'ML Theory',content:'Content'};
  const catColors = {projects:'var(--purple)',dsa:'var(--teal)',theory:'var(--amber)',content:'var(--coral)'};

  return `
<div class="grid2 mb20">
  <div class="stat-card"><div class="stat-label">Weekly Average</div><div class="stat-value" style="color:var(--purple)">${avg}%</div><div class="stat-sub">Target: 80%</div></div>
  <div class="stat-card"><div class="stat-label">Best Day</div><div class="stat-value" style="color:var(--green)">${Math.max(...weeklyScores)}%</div><div class="stat-sub">Thursday</div></div>
  <div class="stat-card"><div class="stat-label">Tasks Completed</div><div class="stat-value">${state.tasks.filter(t=>t.done).length}</div><div class="stat-sub">of ${state.tasks.length} total</div></div>
  <div class="stat-card"><div class="stat-label">Total Points</div><div class="stat-value" style="color:var(--amber)">${totalPts()}</div><div class="stat-sub">Earned this week</div></div>
</div>

<div class="grid2 mb20">
  <div class="card">
    <div class="card-title">📊 7-Day Breakdown</div>
    <div class="chart-bars">
      ${weeklyScores.map((s,i)=>`
      <div class="bar-wrap">
        <div class="bar-val">${s}%</div>
        <div class="bar" style="height:${s}%;background:${s>=80?'var(--green)':s>=50?'var(--purple)':'var(--red)'}"></div>
        <div class="bar-label">${['M','T','W','T','F','S','T'][i]}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🗒️ Weekly Reflection</div>
    <div style="margin-bottom:10px;font-size:12px;color:var(--text3)">What went well? What to improve?</div>
    <textarea class="inp mb16" id="weekly-reflection" placeholder="This week I...">${state.weeklyReflection||''}</textarea>
    <button class="btn btn-primary btn-sm" onclick="saveReflection()">Save Reflection</button>
  </div>
</div>

<div class="card">
  <div class="card-title">✦ AI Weekly Report <span class="phase phase-3">Claude-powered</span></div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Generate an AI-powered summary of your week with strengths, weaknesses, and next week's plan.</div>
  <div id="weekly-ai-display"></div>
  <button class="btn btn-primary" onclick="generateWeeklyReport()">Generate Weekly Report ✦</button>
</div>`;
}

async function generateWeeklyReport() {
  const display = document.getElementById('weekly-ai-display');
  display.innerHTML = `<div class="ai-loading"><div class="dot-anim"><span></span><span></span><span></span></div> Generating your weekly report...</div>`;

  const prompt = `Generate a comprehensive weekly performance review for this ML engineering student. Include:
1. **Performance Summary** — Key metrics in 2-3 sentences
2. **Strengths** — What they did well (2-3 points)
3. **Areas to Improve** — Honest assessment (2-3 points)
4. **Next Week Plan** — Concrete, specific action items (3-5 items)
5. **Motivational Close** — 1-2 sentences of genuine encouragement

Keep it actionable, specific, and under 300 words.`;

  if(!state.aiKey) {
    display.innerHTML = `<div class="ai-suggestion"><div class="ai-label">⚠️ Add API key in AI Coach tab</div><div class="ai-text">Rule-based summary: This week you completed ${state.tasks.filter(t=>t.done).length} tasks with an average score of ${pctDone()}%. Focus on consistency next week.</div></div>`;
    return;
  }
  await callAIToDisplay(prompt, 'weekly-ai-display');
}

async function callAIToDisplay(prompt, displayId) {
  const context = buildAIContext();
  const display = document.getElementById(displayId);
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.aiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: `You are an expert ML engineering career coach. User data:\n${context}`,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    if(data.content && data.content[0]) {
      const text = data.content[0].text;
      display.innerHTML = `<div class="ai-response" style="margin-bottom:14px">${text.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--purple)">$1</strong>').replace(/\n/g,'<br>')}</div>`;
    }
  } catch(e) {
    display.innerHTML = `<div class="ai-suggestion"><div class="ai-label">⚠️ Error</div><div class="ai-text">${e.message}</div></div>`;
  }
}

function saveReflection() {
  state.weeklyReflection = document.getElementById('weekly-reflection').value;
  save();
  alert('Reflection saved!');
}

function saveName() { state.userName=document.getElementById('s-name').value; save(); renderPage(); }
function toggleReminder() {
  state.reminderEnabled=!state.reminderEnabled;
  save();
  document.getElementById('notif-toggle').classList.toggle('on',state.reminderEnabled);
}
function saveStreaks() {
  state.streak=parseInt(document.getElementById('s-streak').value)||0;
  state.longestStreak=parseInt(document.getElementById('s-longest').value)||0;
  save(); updateSidebar(); alert('Streaks updated!');
}
function saveKeyFromSettings() { state.aiKey=document.getElementById('s-key').value.trim(); save(); alert('API key saved!'); }
function resetApp() { if(confirm('Reset ALL data? This cannot be undone.')) { localStorage.removeItem(STORAGE_KEY); state=defaultState(); renderPage(); } }

// ============================================================
// TASK ACTIONS
// ============================================================
function toggleTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if(t) { t.done=!t.done; save(); renderPage(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save(); renderPage();
}

function clearDoneTasks() {
  state.tasks = state.tasks.filter(t=>!t.done);
  save(); renderPage();
}

function openModal() {
  document.getElementById('task-modal').style.display='flex';
  setTimeout(()=>document.getElementById('new-task-name').focus(),50);
}
function closeModal() { document.getElementById('task-modal').style.display='none'; }

function addTask() {
  const name = document.getElementById('new-task-name').value.trim();
  if(!name) return alert('Enter a task name');
  const cat = document.getElementById('new-task-cat').value;
  const pts = Math.max(1,Math.min(30,parseInt(document.getElementById('new-task-pts').value)||10));
  state.tasks.push({ id: state.nextId++, name, cat, pts, done: false });
  save(); closeModal(); renderPage();
}

// ============================================================
// TIMEBLOCK ACTIONS
// ============================================================
function addTimeblock() {
  const start = document.getElementById('tb-start').value;
  const end = document.getElementById('tb-end').value;
  const title = document.getElementById('tb-title').value.trim();
  const cat = document.getElementById('tb-cat').value;
  if(!title) return alert('Enter a title');
  state.timeblocks.push({ id: state.nextId++, start, end, title, cat });
  save(); renderPage();
}
function deleteTimeblock(id) { state.timeblocks=state.timeblocks.filter(t=>t.id!==id); save(); renderPage(); }
